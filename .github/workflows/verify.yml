name: Verify marketplace

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    outputs:
      has_plugin: ${{ steps.detect.outputs.has_plugin }}
      catalog_matches_plugin: ${{ steps.detect.outputs.catalog_matches_plugin }}
      plugin_version: ${{ steps.detect.outputs.plugin_version }}
      catalog_version: ${{ steps.detect.outputs.catalog_version }}
      previous_catalog_version: ${{ steps.detect.outputs.previous_catalog_version }}
      catalog_promoted: ${{ steps.detect.outputs.catalog_promoted }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect staged and stable versions
        id: detect
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 scripts/detect_promotion.py
      - name: Verify repository contract
        shell: bash
        run: |
          set -euo pipefail
          args=()
          test -d plugins/unica || args+=(--allow-empty)
          python3 scripts/verify_marketplace.py "${args[@]}"
          python3 -m unittest discover -s tests -v

  resolve-migration-target:
    needs: contract
    # The automatic consumer test begins at the catalog promotion boundary.
    # catalog_promoted means source.ref changed (or was first added), so JSON
    # formatting and unrelated metadata edits with the same ref do not trigger it.
    # A staged-plugin-only PR is excluded: its still-old catalog cannot install
    # the newly staged package, so that earlier phase is covered by package smoke.
    if: >-
      (github.event_name == 'pull_request' &&
       needs.contract.outputs.catalog_promoted == 'true' &&
       needs.contract.outputs.catalog_matches_plugin == 'true') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' &&
       needs.contract.outputs.catalog_promoted == 'true' &&
       needs.contract.outputs.catalog_matches_plugin == 'true')
    runs-on: ubuntu-latest
    outputs:
      marketplace_ref: ${{ steps.resolve.outputs.marketplace_ref }}
      marketplace_commit: ${{ steps.resolve.outputs.marketplace_commit }}
      target_version: ${{ steps.resolve.outputs.target_version }}
      installer_ps1_sha256: ${{ steps.resolve.outputs.installer_ps1_sha256 }}
      installer_sh_sha256: ${{ steps.resolve.outputs.installer_sh_sha256 }}
    steps:
      - name: Select the promotion event commit and installer ref
        id: select
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_SHA: ${{ github.sha }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          MARKETPLACE_REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:EVENT_NAME -eq 'pull_request' -and
              $env:PR_HEAD_REPOSITORY -ne $env:MARKETPLACE_REPOSITORY) {
            throw 'A staged marketplace candidate must come from this repository'
          }
          $targetRef = if ($env:EVENT_NAME -eq 'pull_request') {
            $env:PR_HEAD_REF
          } else {
            'main'
          }
          $targetCommit = if ($env:EVENT_NAME -eq 'pull_request') {
            $env:PR_HEAD_SHA
          } else {
            $env:EVENT_SHA
          }
          if ($targetRef -notmatch '^[A-Za-z0-9][A-Za-z0-9._/-]*$' -or
              $targetRef.EndsWith('/') -or $targetRef.Contains('//') -or $targetRef.Contains('..')) {
            throw "Unsafe marketplace ref: $targetRef"
          }
          if ($targetCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Invalid marketplace event commit: $targetCommit"
          }
          "marketplace_ref=$targetRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "marketplace_commit=$targetCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.select.outputs.marketplace_commit }}
          fetch-depth: 1

      - name: Resolve the staged package's published source release
        id: resolve
        shell: pwsh
        env:
          MARKETPLACE_REF: ${{ steps.select.outputs.marketplace_ref }}
          EXPECTED_MARKETPLACE_COMMIT: ${{ steps.select.outputs.marketplace_commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pluginPath = Join-Path $env:GITHUB_WORKSPACE 'plugins/unica/.codex-plugin/plugin.json'
          if (-not (Test-Path -LiteralPath $pluginPath -PathType Leaf)) {
            throw "Selected marketplace ref $env:MARKETPLACE_REF has no staged Unica plugin"
          }
          $plugin = Get-Content -LiteralPath $pluginPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $targetVersion = [string]$plugin.version
          if ($targetVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Staged Unica plugin has an invalid version: $targetVersion"
          }
          $sourceRelease = "v$targetVersion"
          $marketplaceCommit = (& git rev-parse HEAD).Trim()
          if ($marketplaceCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Selected marketplace ref $env:MARKETPLACE_REF did not resolve to a commit"
          }
          if ($marketplaceCommit -ne $env:EXPECTED_MARKETPLACE_COMMIT) {
            throw "Marketplace HEAD $marketplaceCommit did not resolve to expected event commit $env:EXPECTED_MARKETPLACE_COMMIT"
          }
          $releaseText = (& gh release view $sourceRelease --repo IngvarConsulting/unica --json tagName,isDraft,publishedAt,assets) | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "Source release $sourceRelease is not published for selected marketplace ref $env:MARKETPLACE_REF"
          }
          $release = $releaseText | ConvertFrom-Json
          if ($release.tagName -ne $sourceRelease) {
            throw "Source release $($release.tagName) does not match staged plugin version $targetVersion"
          }
          if ($release.isDraft -or [string]::IsNullOrWhiteSpace([string]$release.publishedAt)) {
            throw "Source release $sourceRelease must be published and not a draft"
          }
          function Get-InstallerDigest([string]$assetName) {
            $matches = @($release.assets | Where-Object { $_.name -eq $assetName })
            if ($matches.Count -ne 1) {
              throw "Source release $sourceRelease must contain exactly one $assetName asset"
            }
            $digest = [string]$matches[0].digest
            $digestMatch = [regex]::Match($digest, '^sha256:(?<sha>[0-9a-fA-F]{64})$')
            if (-not $digestMatch.Success) {
              throw "Source release $sourceRelease asset $assetName has no SHA-256 digest"
            }
            return $digestMatch.Groups['sha'].Value.ToLowerInvariant()
          }
          $installerPs1Sha256 = Get-InstallerDigest 'install-unica.ps1'
          $installerShSha256 = Get-InstallerDigest 'install-unica.sh'
          "marketplace_ref=$env:MARKETPLACE_REF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "marketplace_commit=$marketplaceCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_version=$targetVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_ps1_sha256=$installerPs1Sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_sh_sha256=$installerShSha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  staged-package-smoke:
    needs: contract
    if: ${{ needs.contract.outputs.has_plugin == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            codex_asset: codex-aarch64-apple-darwin.tar.gz
            codex_name: codex-aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            codex_asset: codex-x86_64-unknown-linux-musl.tar.gz
            codex_name: codex-x86_64-unknown-linux-musl
          - os: windows-2022
            target: win-x64
            codex_asset: codex-x86_64-pc-windows-msvc.exe.zip
            codex_name: codex-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify staged native bootstrap and MCP
        shell: pwsh
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          TARGET: ${{ matrix.target }}
          CODEX_ASSET: ${{ matrix.codex_asset }}
          CODEX_NAME: ${{ matrix.codex_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $codexDir = Join-Path $env:RUNNER_TEMP 'codex-native'
          New-Item -ItemType Directory -Force -Path $codexDir | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern $env:CODEX_ASSET --dir $codexDir
          $archive = Get-ChildItem -LiteralPath $codexDir -File | Select-Object -First 1
          if ($archive.Extension -eq '.zip') {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $codexDir
          } else {
            & tar -xzf $archive.FullName -C $codexDir
          }
          $codex = Get-ChildItem -LiteralPath $codexDir -Recurse -File |
            Where-Object { $_.Name -eq $env:CODEX_NAME } |
            Select-Object -First 1
          if (-not $codex) { throw "Native Codex executable $env:CODEX_NAME is missing" }

          if ($env:TARGET -eq 'win-x64') {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
          } else {
            $env:PATH = '/usr/bin:/bin'
          }
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node.js leaked into the consumer PATH' }
          if ($env:TARGET -ne 'win-x64') { chmod +x $codex.FullName }
          & $codex.FullName --version

          $pluginRoot = (Resolve-Path -LiteralPath 'plugins/unica').Path

          $executable = if ($env:TARGET -eq 'win-x64') { 'unica-bootstrap.exe' } else { 'unica-bootstrap' }
          $bootstrap = Join-Path $pluginRoot "bootstrap/bin/$env:TARGET/$executable"
          if ($env:TARGET -ne 'win-x64') { chmod +x $bootstrap }
          & $bootstrap verify --plugin-root $pluginRoot

  consumer-fresh-install:
    needs: contract
    if: ${{ needs.contract.outputs.catalog_matches_plugin == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            codex_asset: codex-aarch64-apple-darwin.tar.gz
            codex_name: codex-aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            codex_asset: codex-x86_64-unknown-linux-musl.tar.gz
            codex_name: codex-x86_64-unknown-linux-musl
          - os: windows-2022
            target: win-x64
            codex_asset: codex-x86_64-pc-windows-msvc.exe.zip
            codex_name: codex-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install from the candidate catalog and verify MCP
        shell: pwsh
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          TARGET: ${{ matrix.target }}
          CODEX_ASSET: ${{ matrix.codex_asset }}
          CODEX_NAME: ${{ matrix.codex_name }}
          EXPECTED_VERSION: ${{ needs.contract.outputs.plugin_version }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $codexDir = Join-Path $env:RUNNER_TEMP 'codex-native'
          New-Item -ItemType Directory -Force -Path $codexDir | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern $env:CODEX_ASSET --dir $codexDir
          $archive = Get-ChildItem -LiteralPath $codexDir -File | Select-Object -First 1
          if ($archive.Extension -eq '.zip') {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $codexDir
          } else {
            & tar -xzf $archive.FullName -C $codexDir
          }
          $codex = Get-ChildItem -LiteralPath $codexDir -Recurse -File |
            Where-Object { $_.Name -eq $env:CODEX_NAME } |
            Select-Object -First 1
          if (-not $codex) { throw "Native Codex executable $env:CODEX_NAME is missing" }

          if ($env:TARGET -eq 'win-x64') {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
          } else {
            $env:PATH = '/usr/bin:/bin'
          }
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node.js leaked into the consumer PATH' }
          if ($env:TARGET -ne 'win-x64') { chmod +x $codex.FullName }

          if ($env:EVENT_NAME -eq 'push' -and $env:EVENT_REF -eq 'refs/heads/main') {
            & $codex.FullName plugin marketplace add IngvarConsulting/unica-marketplace --ref main --json
          } else {
            & $codex.FullName plugin marketplace add $env:GITHUB_WORKSPACE --json
          }
          & $codex.FullName plugin add unica@unica --json
          $state = (& $codex.FullName plugin list --available --json) | ConvertFrom-Json
          $matches = @($state.installed | Where-Object {
            $_.pluginId -eq 'unica@unica' -and $_.version -eq $env:EXPECTED_VERSION
          })
          if ($matches.Count -ne 1) { throw "Expected exactly one installed unica@unica $env:EXPECTED_VERSION" }

          $installed = Get-ChildItem -LiteralPath $env:CODEX_HOME -Filter runtime-manifest.json -Recurse -File |
            Select-Object -First 1
          if (-not $installed) { throw 'Codex did not install the Unica package' }
          $pluginRoot = $installed.Directory.FullName
          $executable = if ($env:TARGET -eq 'win-x64') { 'unica-bootstrap.exe' } else { 'unica-bootstrap' }
          $bootstrap = Join-Path $pluginRoot "bootstrap/bin/$env:TARGET/$executable"
          if ($env:TARGET -ne 'win-x64') { chmod +x $bootstrap }
          & $bootstrap verify --plugin-root $pluginRoot

  previous-stable-seed:
    needs: contract
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.contract.outputs.has_plugin == 'true' &&
      needs.contract.outputs.catalog_version != '' &&
      needs.contract.outputs.catalog_matches_plugin != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            codex_asset: codex-aarch64-apple-darwin.tar.gz
            codex_name: codex-aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            codex_asset: codex-x86_64-unknown-linux-musl.tar.gz
            codex_name: codex-x86_64-unknown-linux-musl
          - os: windows-2022
            target: win-x64
            codex_asset: codex-x86_64-pc-windows-msvc.exe.zip
            codex_name: codex-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Restore an existing previous-stable seed
        id: seed-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/codex-upgrade-home
          key: unica-upgrade-${{ matrix.target }}-${{ needs.contract.outputs.catalog_version }}
      - name: Install the current stable version for the next promotion
        if: steps.seed-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-upgrade-home
          TARGET: ${{ matrix.target }}
          CODEX_ASSET: ${{ matrix.codex_asset }}
          CODEX_NAME: ${{ matrix.codex_name }}
          EXPECTED_VERSION: ${{ needs.contract.outputs.catalog_version }}
          TARGET_MARKETPLACE_REF: main
          TARGET_MARKETPLACE_COMMIT: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $codexDir = Join-Path $env:RUNNER_TEMP 'codex-native-seed'
          New-Item -ItemType Directory -Force -Path $codexDir | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern $env:CODEX_ASSET --dir $codexDir
          $archive = Get-ChildItem -LiteralPath $codexDir -File | Select-Object -First 1
          if ($archive.Extension -eq '.zip') {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $codexDir
          } else {
            & tar -xzf $archive.FullName -C $codexDir
          }
          $codex = Get-ChildItem -LiteralPath $codexDir -Recurse -File |
            Where-Object { $_.Name -eq $env:CODEX_NAME } |
            Select-Object -First 1
          if (-not $codex) { throw "Native Codex executable $env:CODEX_NAME is missing" }
          if ($env:TARGET -eq 'win-x64') {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
          } else {
            $env:PATH = '/usr/bin:/bin'
          }
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node.js leaked into the consumer PATH' }
          if ($env:TARGET -ne 'win-x64') { chmod +x $codex.FullName }

          function Assert-MarketplaceRefAtCommit {
            if ($env:TARGET_MARKETPLACE_COMMIT -notmatch '^[0-9a-f]{40}$') {
              throw "Expected marketplace commit is invalid: $env:TARGET_MARKETPLACE_COMMIT"
            }
            $remoteUrl = 'https://github.com/IngvarConsulting/unica-marketplace.git'
            $remoteLines = @(& git ls-remote --heads $remoteUrl "refs/heads/$env:TARGET_MARKETPLACE_REF" 2>&1)
            if ($LASTEXITCODE -ne 0) {
              throw "Cannot resolve marketplace branch $env:TARGET_MARKETPLACE_REF"
            }
            $remoteCommits = @($remoteLines | ForEach-Object {
              $parts = $_ -split '\s+', 2
              if ($parts.Count -eq 2) { $parts[0] }
            })
            if ($remoteCommits.Count -ne 1) {
              throw "Marketplace branch $env:TARGET_MARKETPLACE_REF must resolve exactly once"
            }
            if ($remoteCommits[0] -ne $env:TARGET_MARKETPLACE_COMMIT) {
              throw "Marketplace branch $env:TARGET_MARKETPLACE_REF moved: expected $env:TARGET_MARKETPLACE_COMMIT, got $($remoteCommits[0])"
            }
          }

          Assert-MarketplaceRefAtCommit
          & $codex.FullName plugin marketplace add IngvarConsulting/unica-marketplace --ref main --json
          & $codex.FullName plugin add unica@unica --json
          $state = (& $codex.FullName plugin list --available --json) | ConvertFrom-Json
          $matches = @($state.installed | Where-Object {
            $_.pluginId -eq 'unica@unica' -and $_.version -eq $env:EXPECTED_VERSION
          })
          if ($matches.Count -ne 1) { throw "Failed to seed unica@unica $env:EXPECTED_VERSION" }
          Assert-MarketplaceRefAtCommit
      - name: Save the previous-stable seed
        if: steps.seed-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/codex-upgrade-home
          key: unica-upgrade-${{ matrix.target }}-${{ needs.contract.outputs.catalog_version }}

  previous-stable-upgrade:
    needs: [contract, resolve-migration-target]
    if: >-
      always() && needs.resolve-migration-target.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.contract.outputs.catalog_matches_plugin == 'true' &&
      needs.contract.outputs.previous_catalog_version != '' &&
      needs.contract.outputs.previous_catalog_version != needs.contract.outputs.catalog_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            codex_asset: codex-aarch64-apple-darwin.tar.gz
            codex_name: codex-aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            codex_asset: codex-x86_64-unknown-linux-musl.tar.gz
            codex_name: codex-x86_64-unknown-linux-musl
          - os: windows-2022
            target: win-x64
            codex_asset: codex-x86_64-pc-windows-msvc.exe.zip
            codex_name: codex-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Restore the exact previous stable installation
        id: seed-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/codex-upgrade-home
          key: unica-upgrade-${{ matrix.target }}-${{ needs.contract.outputs.previous_catalog_version }}
          fail-on-cache-miss: true
      - name: Run the documented explicit update and verify MCP
        shell: pwsh
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-upgrade-home
          TARGET: ${{ matrix.target }}
          CODEX_ASSET: ${{ matrix.codex_asset }}
          CODEX_NAME: ${{ matrix.codex_name }}
          EXPECTED_VERSION: ${{ needs.contract.outputs.plugin_version }}
          TARGET_MARKETPLACE_REF: ${{ needs.resolve-migration-target.outputs.marketplace_ref }}
          TARGET_MARKETPLACE_COMMIT: ${{ needs.resolve-migration-target.outputs.marketplace_commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $codexDir = Join-Path $env:RUNNER_TEMP 'codex-native-upgrade'
          New-Item -ItemType Directory -Force -Path $codexDir | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern $env:CODEX_ASSET --dir $codexDir
          $archive = Get-ChildItem -LiteralPath $codexDir -File | Select-Object -First 1
          if ($archive.Extension -eq '.zip') {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $codexDir
          } else {
            & tar -xzf $archive.FullName -C $codexDir
          }
          $codex = Get-ChildItem -LiteralPath $codexDir -Recurse -File |
            Where-Object { $_.Name -eq $env:CODEX_NAME } |
            Select-Object -First 1
          if (-not $codex) { throw "Native Codex executable $env:CODEX_NAME is missing" }
          if ($env:TARGET -eq 'win-x64') {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
          } else {
            $env:PATH = '/usr/bin:/bin'
          }
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node.js leaked into the consumer PATH' }
          if ($env:TARGET -ne 'win-x64') { chmod +x $codex.FullName }

          function Assert-MarketplaceRefAtCommit {
            if ($env:TARGET_MARKETPLACE_COMMIT -notmatch '^[0-9a-f]{40}$') {
              throw "Expected marketplace commit is invalid: $env:TARGET_MARKETPLACE_COMMIT"
            }
            $remoteUrl = 'https://github.com/IngvarConsulting/unica-marketplace.git'
            $remoteLines = @(& git ls-remote --heads $remoteUrl "refs/heads/$env:TARGET_MARKETPLACE_REF" 2>&1)
            if ($LASTEXITCODE -ne 0) {
              throw "Cannot resolve marketplace branch $env:TARGET_MARKETPLACE_REF"
            }
            $remoteCommits = @($remoteLines | ForEach-Object {
              $parts = $_ -split '\s+', 2
              if ($parts.Count -eq 2) { $parts[0] }
            })
            if ($remoteCommits.Count -ne 1) {
              throw "Marketplace branch $env:TARGET_MARKETPLACE_REF must resolve exactly once"
            }
            if ($remoteCommits[0] -ne $env:TARGET_MARKETPLACE_COMMIT) {
              throw "Marketplace branch $env:TARGET_MARKETPLACE_REF moved: expected $env:TARGET_MARKETPLACE_COMMIT, got $($remoteCommits[0])"
            }
          }

          Assert-MarketplaceRefAtCommit
          & $codex.FullName plugin marketplace upgrade unica --json
          & $codex.FullName plugin remove unica@unica --json
          & $codex.FullName plugin add unica@unica --json
          $state = (& $codex.FullName plugin list --available --json) | ConvertFrom-Json
          $matches = @($state.installed | Where-Object {
            $_.pluginId -eq 'unica@unica' -and $_.version -eq $env:EXPECTED_VERSION
          })
          if ($matches.Count -ne 1) { throw "Explicit update did not install unica@unica $env:EXPECTED_VERSION" }
          if (@($state.available).Count -ne 0) { throw 'Explicit update left another Unica version available' }

          $installed = Get-ChildItem -LiteralPath $env:CODEX_HOME -Filter runtime-manifest.json -Recurse -File |
            Select-Object -First 1
          if (-not $installed) { throw 'Updated Unica package is missing' }
          $pluginRoot = $installed.Directory.FullName
          $executable = if ($env:TARGET -eq 'win-x64') { 'unica-bootstrap.exe' } else { 'unica-bootstrap' }
          $bootstrap = Join-Path $pluginRoot "bootstrap/bin/$env:TARGET/$executable"
          if ($env:TARGET -ne 'win-x64') { chmod +x $bootstrap }
          & $bootstrap verify --plugin-root $pluginRoot
          Assert-MarketplaceRefAtCommit

  legacy-stable-upgrade:
    needs: [contract, resolve-migration-target]
    if: ${{ always() && needs.resolve-migration-target.result == 'success' }}
    uses: ./.github/workflows/legacy-migration-case.yml
    with:
      label: legacy-stable-v0.6.1-issue-90
      source_version: 0.6.1
      source_release: v0.6.1
      source_kind: platform-archive
      layout: issue-90-duplicate
      target_marketplace_ref: ${{ needs.resolve-migration-target.outputs.marketplace_ref }}
      target_marketplace_commit: ${{ needs.resolve-migration-target.outputs.marketplace_commit }}
      target_version: ${{ needs.resolve-migration-target.outputs.target_version }}
      target_installer_ps1_sha256: ${{ needs.resolve-migration-target.outputs.installer_ps1_sha256 }}
      target_installer_sh_sha256: ${{ needs.resolve-migration-target.outputs.installer_sh_sha256 }}
    secrets: inherit
