name: Full legacy migration regression

on:
  workflow_dispatch:
    inputs:
      marketplace_ref:
        description: Optional safe marketplace branch or tag override; defaults to the selected workflow ref.
        required: false
        type: string
      target_version:
        description: Optional source release version assertion, without the v prefix.
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      marketplace_ref: ${{ steps.resolve.outputs.marketplace_ref }}
      marketplace_commit: ${{ steps.resolve.outputs.marketplace_commit }}
      target_version: ${{ steps.resolve.outputs.target_version }}
      installer_ps1_sha256: ${{ steps.resolve.outputs.installer_ps1_sha256 }}
      installer_sh_sha256: ${{ steps.resolve.outputs.installer_sh_sha256 }}
    steps:
      - name: Select the marketplace ref
        id: select
        shell: pwsh
        env:
          WORKFLOW_REF: ${{ github.ref_name }}
          REQUESTED_REF: ${{ inputs.marketplace_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $targetRef = if (-not [string]::IsNullOrWhiteSpace($env:REQUESTED_REF)) {
            $env:REQUESTED_REF.Trim()
          } elseif ($env:EVENT_NAME -eq 'schedule') {
            'main'
          } else {
            $env:WORKFLOW_REF
          }
          if ($targetRef -notmatch '^[A-Za-z0-9][A-Za-z0-9._/-]*$' -or
              $targetRef.EndsWith('/') -or $targetRef.Contains('//') -or $targetRef.Contains('..')) {
            throw "Unsafe marketplace ref: $targetRef"
          }
          "marketplace_ref=$targetRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.select.outputs.marketplace_ref }}
          fetch-depth: 1

      - name: Verify the selected marketplace catalog and source release
        id: resolve
        shell: pwsh
        env:
          MARKETPLACE_REF: ${{ steps.select.outputs.marketplace_ref }}
          REQUESTED_VERSION: ${{ inputs.target_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $catalogPath = Join-Path $env:GITHUB_WORKSPACE '.agents/plugins/marketplace.json'
          if (-not (Test-Path -LiteralPath $catalogPath -PathType Leaf)) {
            throw "Selected marketplace ref $env:MARKETPLACE_REF has no catalog: $catalogPath"
          }
          $catalog = Get-Content -LiteralPath $catalogPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $plugins = @($catalog.plugins | Where-Object { $_.name -eq 'unica' })
          if ($plugins.Count -ne 1) {
            throw "Selected marketplace ref $env:MARKETPLACE_REF must contain exactly one Unica plugin"
          }
          $source = $plugins[0].source
          if ($source.source -ne 'git-subdir' -or
              $source.url -ne 'https://github.com/IngvarConsulting/unica-marketplace.git' -or
              $source.path -ne './plugins/unica') {
            throw 'Selected marketplace catalog has an unexpected Unica source'
          }
          $catalogTag = [string]$source.ref
          $tagMatch = [regex]::Match($catalogTag, '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+)$')
          if (-not $tagMatch.Success) {
            throw "Marketplace catalog tag must be a semantic version tag: $catalogTag"
          }
          $targetVersion = $tagMatch.Groups['version'].Value
          $requestedVersion = $env:REQUESTED_VERSION.Trim()
          if ($requestedVersion -and $requestedVersion -ne $targetVersion) {
            throw "Marketplace catalog tag $catalogTag does not match requested target version $requestedVersion"
          }
          $marketplaceCommit = (& git rev-parse HEAD).Trim()
          if ($marketplaceCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Selected marketplace ref $env:MARKETPLACE_REF did not resolve to a commit"
          }
          $releaseText = (& gh release view $catalogTag --repo IngvarConsulting/unica --json tagName,isDraft,publishedAt,assets) | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "Source release $catalogTag is not published for selected marketplace ref $env:MARKETPLACE_REF"
          }
          $release = $releaseText | ConvertFrom-Json
          if ($release.tagName -ne $catalogTag) {
            throw "Source release $($release.tagName) does not match marketplace catalog tag $catalogTag"
          }
          if ($release.isDraft -or [string]::IsNullOrWhiteSpace([string]$release.publishedAt)) {
            throw "Source release $catalogTag must be published and not a draft"
          }
          function Get-InstallerDigest([string]$assetName) {
            $matches = @($release.assets | Where-Object { $_.name -eq $assetName })
            if ($matches.Count -ne 1) {
              throw "Source release $catalogTag must contain exactly one $assetName asset"
            }
            $digest = [string]$matches[0].digest
            $digestMatch = [regex]::Match($digest, '^sha256:(?<sha>[0-9a-fA-F]{64})$')
            if (-not $digestMatch.Success) {
              throw "Source release $catalogTag asset $assetName has no SHA-256 digest"
            }
            return $digestMatch.Groups['sha'].Value.ToLowerInvariant()
          }
          $installerPs1Sha256 = Get-InstallerDigest 'install-unica.ps1'
          $installerShSha256 = Get-InstallerDigest 'install-unica.sh'
          "marketplace_ref=$env:MARKETPLACE_REF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "marketplace_commit=$marketplaceCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_version=$targetVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_ps1_sha256=$installerPs1Sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_sh_sha256=$installerShSha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  regression:
    needs: resolve-target
    strategy:
      fail-fast: false
      matrix:
        source:
          - label: v0.3.3
            version: 0.3.3
            release: v0.3.3
            kind: version-bundle
            layout: legacy-canonical
          - label: v0.3.10
            version: 0.3.10
            release: v0.3.10
            kind: platform-archive
            layout: legacy-alias
          - label: v0.3.11
            version: 0.3.11
            release: v0.3.11
            kind: platform-archive
            layout: legacy-alias
          - label: v0.3.12
            version: 0.3.12
            release: v0.3.12
            kind: platform-archive
            layout: legacy-alias
          - label: v0.4.1
            version: 0.4.1
            release: v0.4.1
            kind: platform-archive
            layout: legacy-alias
          - label: v0.4.2
            version: 0.4.2
            release: v0.4.2
            kind: platform-archive
            layout: legacy-alias
          - label: v0.4.3
            version: 0.4.3
            release: v0.4.3
            kind: platform-archive
            layout: legacy-alias
          - label: v0.4.4
            version: 0.4.4
            release: v0.4.4
            kind: platform-archive
            layout: legacy-alias
          - label: v0.5.1
            version: 0.5.1
            release: v0.5.1
            kind: platform-archive
            layout: legacy-alias
          - label: v0.6.1
            version: 0.6.1
            release: v0.6.1
            kind: platform-archive
            layout: legacy-alias
          - label: v0.7.2
            version: 0.7.2
            release: 643046a111d15a1ffc13c836a930a7569b552c69
            kind: marketplace-promotion
            layout: marketplace-canonical
          - label: issue-90-duplicate
            version: 0.6.1
            release: v0.6.1
            kind: platform-archive
            layout: issue-90-duplicate
    uses: ./.github/workflows/legacy-migration-case.yml
    with:
      label: ${{ matrix.source.label }}
      source_version: ${{ matrix.source.version }}
      source_release: ${{ matrix.source.release }}
      source_kind: ${{ matrix.source.kind }}
      layout: ${{ matrix.source.layout }}
      target_marketplace_ref: ${{ needs.resolve-target.outputs.marketplace_ref }}
      target_marketplace_commit: ${{ needs.resolve-target.outputs.marketplace_commit }}
      target_version: ${{ needs.resolve-target.outputs.target_version }}
      target_installer_ps1_sha256: ${{ needs.resolve-target.outputs.installer_ps1_sha256 }}
      target_installer_sh_sha256: ${{ needs.resolve-target.outputs.installer_sh_sha256 }}
    secrets: inherit
