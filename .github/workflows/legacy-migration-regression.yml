name: Full legacy migration regression

on:
  workflow_dispatch:
    inputs:
      marketplace_ref:
        description: Optional safe marketplace branch or tag override; defaults to the selected workflow ref.
        required: false
        type: string
      target_version:
        description: Optional source release version assertion, without the v prefix.
        required: false
        type: string
      profile_set:
        description: Current CLI coverage, or the v0.7.6 bridge with representative historical CLI cases.
        required: true
        type: choice
        default: current
        options:
          - current
          - bridge

concurrency:
  group: legacy-migration-${{ github.ref }}-${{ inputs.marketplace_ref || github.ref_name }}-${{ inputs.profile_set }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      marketplace_ref: ${{ steps.resolve.outputs.marketplace_ref }}
      marketplace_commit: ${{ steps.resolve.outputs.marketplace_commit }}
      target_version: ${{ steps.resolve.outputs.target_version }}
      installer_ps1_sha256: ${{ steps.resolve.outputs.installer_ps1_sha256 }}
      installer_sh_sha256: ${{ steps.resolve.outputs.installer_sh_sha256 }}
      source_matrix: ${{ steps.matrix.outputs.source_matrix }}
    steps:
      - name: Select the marketplace ref
        id: select
        shell: pwsh
        env:
          WORKFLOW_REF: ${{ github.ref_name }}
          REQUESTED_REF: ${{ inputs.marketplace_ref }}
        run: |
          $ErrorActionPreference = 'Stop'
          $targetRef = if (-not [string]::IsNullOrWhiteSpace($env:REQUESTED_REF)) {
            $env:REQUESTED_REF.Trim()
          } else {
            $env:WORKFLOW_REF
          }
          if ($targetRef -notmatch '^[A-Za-z0-9][A-Za-z0-9._/-]*$' -or
              $targetRef.EndsWith('/') -or $targetRef.Contains('//') -or $targetRef.Contains('..')) {
            throw "Unsafe marketplace ref: $targetRef"
          }
          "marketplace_ref=$targetRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.select.outputs.marketplace_ref }}
          fetch-depth: 1

      - name: Verify the selected marketplace catalog and source release
        id: resolve
        shell: pwsh
        env:
          MARKETPLACE_REF: ${{ steps.select.outputs.marketplace_ref }}
          REQUESTED_VERSION: ${{ inputs.target_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $catalogPath = Join-Path $env:GITHUB_WORKSPACE '.agents/plugins/marketplace.json'
          if (-not (Test-Path -LiteralPath $catalogPath -PathType Leaf)) {
            throw "Selected marketplace ref $env:MARKETPLACE_REF has no catalog: $catalogPath"
          }
          $catalog = Get-Content -LiteralPath $catalogPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $plugins = @($catalog.plugins | Where-Object { $_.name -eq 'unica' })
          if ($plugins.Count -ne 1) {
            throw "Selected marketplace ref $env:MARKETPLACE_REF must contain exactly one Unica plugin"
          }
          $source = $plugins[0].source
          if ($source.source -ne 'git-subdir' -or
              $source.url -ne 'https://github.com/IngvarConsulting/unica-marketplace.git' -or
              $source.path -ne './plugins/unica') {
            throw 'Selected marketplace catalog has an unexpected Unica source'
          }
          $catalogTag = [string]$source.ref
          $tagMatch = [regex]::Match($catalogTag, '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+)$')
          if (-not $tagMatch.Success) {
            throw "Marketplace catalog tag must be a semantic version tag: $catalogTag"
          }
          $targetVersion = $tagMatch.Groups['version'].Value
          $requestedVersion = $env:REQUESTED_VERSION.Trim()
          if ($requestedVersion -and $requestedVersion -ne $targetVersion) {
            throw "Marketplace catalog tag $catalogTag does not match requested target version $requestedVersion"
          }
          $marketplaceCommit = (& git rev-parse HEAD).Trim()
          if ($marketplaceCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Selected marketplace ref $env:MARKETPLACE_REF did not resolve to a commit"
          }
          $releaseText = (& gh release view $catalogTag --repo IngvarConsulting/unica --json tagName,isDraft,publishedAt,assets) | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "Source release $catalogTag is not published for selected marketplace ref $env:MARKETPLACE_REF"
          }
          $release = $releaseText | ConvertFrom-Json
          if ($release.tagName -ne $catalogTag) {
            throw "Source release $($release.tagName) does not match marketplace catalog tag $catalogTag"
          }
          if ($release.isDraft -or [string]::IsNullOrWhiteSpace([string]$release.publishedAt)) {
            throw "Source release $catalogTag must be published and not a draft"
          }
          function Get-InstallerDigest([string]$assetName) {
            $matches = @($release.assets | Where-Object { $_.name -eq $assetName })
            if ($matches.Count -ne 1) {
              throw "Source release $catalogTag must contain exactly one $assetName asset"
            }
            $digest = [string]$matches[0].digest
            $digestMatch = [regex]::Match($digest, '^sha256:(?<sha>[0-9a-fA-F]{64})$')
            if (-not $digestMatch.Success) {
              throw "Source release $catalogTag asset $assetName has no SHA-256 digest"
            }
            return $digestMatch.Groups['sha'].Value.ToLowerInvariant()
          }
          $installerPs1Sha256 = Get-InstallerDigest 'install-unica.ps1'
          $installerShSha256 = Get-InstallerDigest 'install-unica.sh'
          "marketplace_ref=$env:MARKETPLACE_REF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "marketplace_commit=$marketplaceCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_version=$targetVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_ps1_sha256=$installerPs1Sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_sh_sha256=$installerShSha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate the selected manual regression matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/regression_policy.py matrix \
            --inventory .github/contracts/legacy-releases.json \
            --profile-set '${{ inputs.profile_set }}' \
            --github-output "$GITHUB_OUTPUT"

  regression:
    needs: resolve-target
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJSON(needs.resolve-target.outputs.source_matrix) }}
    uses: ./.github/workflows/legacy-migration-case.yml
    with:
      label: ${{ matrix.source.label }}
      source_version: ${{ matrix.source.version }}
      source_release: ${{ matrix.source.release }}
      source_kind: ${{ matrix.source.kind }}
      source_commit: ${{ matrix.source.sourceCommit }}
      source_assets: ${{ toJSON(matrix.source.assets) }}
      layout: ${{ matrix.source.layout }}
      codex_profile: ${{ matrix.source.codexProfile }}
      target_marketplace_ref: ${{ needs.resolve-target.outputs.marketplace_ref }}
      target_marketplace_commit: ${{ needs.resolve-target.outputs.marketplace_commit }}
      target_version: ${{ needs.resolve-target.outputs.target_version }}
      target_installer_ps1_sha256: ${{ needs.resolve-target.outputs.installer_ps1_sha256 }}
      target_installer_sh_sha256: ${{ needs.resolve-target.outputs.installer_sh_sha256 }}
    secrets: inherit

  manual-rollback:
    needs: resolve-target
    name: rollback / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-2022
            target: win-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      TARGET: ${{ matrix.target }}
      TARGET_VERSION: ${{ needs.resolve-target.outputs.target_version }}
      TARGET_MARKETPLACE_REF: ${{ needs.resolve-target.outputs.marketplace_ref }}
      TARGET_INSTALLER_PS1_SHA256: ${{ needs.resolve-target.outputs.installer_ps1_sha256 }}
      TARGET_INSTALLER_SH_SHA256: ${{ needs.resolve-target.outputs.installer_sh_sha256 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.marketplace_commit }}
          fetch-depth: 1

      - name: Install the current locked Codex CLI
        uses: ./.github/actions/setup-locked-codex
        with:
          profile: current
          target: ${{ matrix.target }}
          codex-home: ${{ runner.temp }}/codex-rollback-home

      - name: Preserve the real Codex path for failure injection
        shell: pwsh
        run: |
          "REAL_CODEX=$env:CODEX_BIN" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Rebuild the issue 90 fixture and capture its exact state
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $inventory = Get-Content -LiteralPath '.github/contracts/legacy-releases.json' -Raw -Encoding UTF8 | ConvertFrom-Json
          $fixture = @($inventory.fixtures | Where-Object { $_.label -eq 'issue-90-duplicate' })
          if ($fixture.Count -ne 1) { throw 'Issue 90 fixture contract must resolve exactly once' }
          $asset = $fixture[0].assets.PSObject.Properties[$env:TARGET].Value
          if (-not $asset -or $asset.sha256 -notmatch '^[0-9a-f]{64}$') {
            throw "Issue 90 fixture has no locked asset for $env:TARGET"
          }
          $downloadDir = Join-Path $env:RUNNER_TEMP 'rollback-release'
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          gh release download $fixture[0].sourceRef --repo IngvarConsulting/unica --pattern $asset.name --dir $downloadDir
          $archive = Join-Path $downloadDir $asset.name
          $actual = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $asset.sha256) { throw "Issue 90 fixture digest mismatch: $actual" }

          $python = Get-Command python3 -ErrorAction SilentlyContinue
          if (-not $python) { $python = Get-Command python }
          & $python.Source scripts/legacy_migration_fixture.py --archive $archive --codex-home $env:CODEX_HOME --version 0.6.1 --layout issue-90-duplicate
          if ($LASTEXITCODE -ne 0) { throw 'Cannot rebuild the rollback fixture' }
          & $python.Source scripts/legacy_migration_fixture.py --codex-home $env:CODEX_HOME --snapshot-output (Join-Path $env:RUNNER_TEMP 'rollback-before.json')
          if ($LASTEXITCODE -ne 0) { throw 'Cannot snapshot the rollback fixture' }

          $installerDir = Join-Path $env:RUNNER_TEMP 'rollback-installer'
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null
          $installerName = if ($env:TARGET -eq 'win-x64') { 'install-unica.ps1' } else { 'install-unica.sh' }
          gh release download "v$env:TARGET_VERSION" --repo IngvarConsulting/unica --pattern $installerName --dir $installerDir
          $installer = Join-Path $installerDir $installerName
          $expected = if ($env:TARGET -eq 'win-x64') { $env:TARGET_INSTALLER_PS1_SHA256 } else { $env:TARGET_INSTALLER_SH_SHA256 }
          $actual = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Rollback installer digest mismatch: $actual" }
          "INSTALLER_PATH=$installer" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Inject one post-mutation Codex failure and require exact rollback
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $shimDir = Join-Path $env:RUNNER_TEMP 'codex-failure-shim'
          $failureMarker = Join-Path $env:RUNNER_TEMP 'codex-failure-injected'
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          if ($env:TARGET -eq 'win-x64') {
            $shim = Join-Path $shimDir 'codex.cmd'
            @"
          @echo off
          if "%1 %2 %3"=="plugin add unica@unica" if not exist "$failureMarker" (
            type nul > "$failureMarker"
            echo injected transactional rollback failure 1>&2
            exit /b 86
          )
          "$env:REAL_CODEX" %*
          exit /b %ERRORLEVEL%
          "@ | Set-Content -LiteralPath $shim -Encoding ASCII
            $env:PATH = "$shimDir;$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
            $migrationText = (& pwsh -NoProfile -File $env:INSTALLER_PATH -Ref $env:TARGET_MARKETPLACE_REF -Target win-x64 -CodexHome $env:CODEX_HOME 2>&1) | Out-String
          } else {
            $shim = Join-Path $shimDir 'codex'
            @"
          #!/bin/sh
          if [ "`$1 `$2 `$3" = "plugin add unica@unica" ] && [ ! -e '$failureMarker' ]; then
            : > '$failureMarker'
            echo 'injected transactional rollback failure' >&2
            exit 86
          fi
          exec '$env:REAL_CODEX' "`$@"
          "@ | Set-Content -LiteralPath $shim -Encoding UTF8
            chmod +x $shim
            $env:PATH = "$shimDir`:/usr/bin:/bin"
            $migrationText = (& sh $env:INSTALLER_PATH --ref $env:TARGET_MARKETPLACE_REF --target $env:TARGET --codex-home $env:CODEX_HOME 2>&1) | Out-String
          }
          $migrationCode = $LASTEXITCODE
          if ($migrationCode -eq 0) { throw 'Injected migration failure unexpectedly succeeded' }
          if (-not (Test-Path -LiteralPath $failureMarker -PathType Leaf)) {
            throw 'Migration failed before reaching the injected post-mutation boundary'
          }
          $diagnostics = Get-ChildItem -LiteralPath (Join-Path $env:CODEX_HOME 'unica/migration-backups') -Filter diagnostics.jsonl -Recurse -File |
            Get-Content -Raw
          if (($diagnostics | Out-String) -notmatch 'rollback-succeeded') {
            throw "Migration did not report rollback-succeeded`n$migrationText"
          }
          $python = Get-Command python3 -ErrorAction SilentlyContinue
          if (-not $python) { $python = Get-Command python }
          & $python.Source scripts/legacy_migration_fixture.py --codex-home $env:CODEX_HOME --compare-snapshot (Join-Path $env:RUNNER_TEMP 'rollback-before.json')
          if ($LASTEXITCODE -ne 0) { throw 'Transactional rollback did not restore the exact fixture state' }

      - name: Upload rollback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/rollback-before.json
            ${{ runner.temp }}/codex-rollback-home/unica/migration-backups
          if-no-files-found: warn
          retention-days: 90
