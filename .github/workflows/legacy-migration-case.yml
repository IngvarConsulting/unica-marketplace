name: Legacy migration case

on:
  workflow_call:
    inputs:
      label:
        required: true
        type: string
      source_version:
        required: true
        type: string
      source_release:
        required: true
        type: string
      source_kind:
        required: true
        type: string
      layout:
        required: true
        type: string
      target_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  migrate:
    name: ${{ inputs.label }} / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            codex_asset: codex-aarch64-apple-darwin.tar.gz
            codex_name: codex-aarch64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            codex_asset: codex-x86_64-unknown-linux-musl.tar.gz
            codex_name: codex-x86_64-unknown-linux-musl
          - os: windows-2022
            target: win-x64
            codex_asset: codex-x86_64-pc-windows-msvc.exe.zip
            codex_name: codex-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    env:
      SOURCE_VERSION: ${{ inputs.source_version }}
      SOURCE_RELEASE: ${{ inputs.source_release }}
      SOURCE_KIND: ${{ inputs.source_kind }}
      FIXTURE_LAYOUT: ${{ inputs.layout }}
      TARGET_VERSION: ${{ inputs.target_version }}
      TARGET: ${{ matrix.target }}
      CODEX_ASSET: ${{ matrix.codex_asset }}
      CODEX_NAME: ${{ matrix.codex_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install the pinned native Codex CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "CODEX_HOME=$(Join-Path $env:RUNNER_TEMP 'codex-home')" |
            Out-File -FilePath $env:GITHUB_ENV -Append
          $codexDir = Join-Path $env:RUNNER_TEMP 'codex-native'
          New-Item -ItemType Directory -Force -Path $codexDir | Out-Null
          gh release download rust-v0.145.0-alpha.18 --repo openai/codex --pattern $env:CODEX_ASSET --dir $codexDir
          $archive = Get-ChildItem -LiteralPath $codexDir -File | Select-Object -First 1
          if ($archive.Extension -eq '.zip') {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $codexDir
          } else {
            & tar -xzf $archive.FullName -C $codexDir
            if ($LASTEXITCODE -ne 0) { throw "Cannot extract $($archive.FullName)" }
          }
          $codex = Get-ChildItem -LiteralPath $codexDir -Recurse -File |
            Where-Object { $_.Name -eq $env:CODEX_NAME } |
            Select-Object -First 1
          if (-not $codex) { throw "Native Codex executable $env:CODEX_NAME is missing" }
          $codexCommandName = if ($env:TARGET -eq 'win-x64') { 'codex.exe' } else { 'codex' }
          $codexCommand = Join-Path $codexDir $codexCommandName
          Copy-Item -LiteralPath $codex.FullName -Destination $codexCommand -Force
          if ($env:TARGET -ne 'win-x64') { chmod +x $codexCommand }
          "CODEX_BIN=$codexCommand" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CODEX_BIN_DIR=$codexDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Rebuild the historical installation from published bits
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $downloadDir = Join-Path $env:RUNNER_TEMP 'historical-release'
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          if ($env:SOURCE_KIND -eq 'marketplace-promotion') {
            $archive = Join-Path $downloadDir "unica-marketplace-$env:SOURCE_RELEASE.tar.gz"
            Invoke-WebRequest `
              -Uri "https://github.com/IngvarConsulting/unica-marketplace/archive/$env:SOURCE_RELEASE.tar.gz" `
              -OutFile $archive
          } else {
            if ($env:SOURCE_KIND -eq 'version-bundle') {
              $asset = "unica-codex-marketplace-$env:SOURCE_VERSION.tar.gz"
            } elseif ($env:TARGET -eq 'win-x64') {
              $asset = 'unica-codex-marketplace-win-x64.zip'
            } else {
              $asset = "unica-codex-marketplace-$env:TARGET.tar.gz"
            }
            gh release download $env:SOURCE_RELEASE `
              --repo IngvarConsulting/unica `
              --pattern $asset `
              --dir $downloadDir
            $archive = Join-Path $downloadDir $asset
          }
          if ($env:FIXTURE_LAYOUT -eq 'issue-90-duplicate') {
            $originDir = Join-Path $downloadDir 'origin-v0.3.11'
            New-Item -ItemType Directory -Force -Path $originDir | Out-Null
            $originAsset = if ($env:TARGET -eq 'win-x64') {
              'unica-codex-marketplace-win-x64.zip'
            } else {
              "unica-codex-marketplace-$env:TARGET.tar.gz"
            }
            gh release download v0.3.11 `
              --repo IngvarConsulting/unica `
              --pattern $originAsset `
              --dir $originDir
          }
          $python = Get-Command python3 -ErrorAction SilentlyContinue
          if (-not $python) { $python = Get-Command python }
          & $python.Source scripts/legacy_migration_fixture.py `
            --archive $archive `
            --codex-home $env:CODEX_HOME `
            --version $env:SOURCE_VERSION `
            --layout $env:FIXTURE_LAYOUT
          if ($LASTEXITCODE -ne 0) { throw 'Cannot rebuild the historical Unica fixture' }

          $installerDir = Join-Path $env:RUNNER_TEMP 'target-installer'
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null
          $installerName = if ($env:TARGET -eq 'win-x64') { 'install-unica.ps1' } else { 'install-unica.sh' }
          gh release download "v$env:TARGET_VERSION" `
            --repo IngvarConsulting/unica `
            --pattern $installerName `
            --dir $installerDir
          "INSTALLER_PATH=$(Join-Path $installerDir $installerName)" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Migrate to the target release and verify the consumer contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $evidence = Join-Path $env:RUNNER_TEMP 'migration-evidence'
          New-Item -ItemType Directory -Force -Path $evidence | Out-Null

          if ($env:TARGET -eq 'win-x64') {
            $env:PATH = "$env:CODEX_BIN_DIR;$env:SystemRoot\System32;$env:SystemRoot;$env:ProgramFiles\Git\cmd"
          } else {
            $env:PATH = "$env:CODEX_BIN_DIR`:/usr/bin:/bin"
          }
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node.js leaked into the consumer PATH' }

          $seedStateText = (& $env:CODEX_BIN plugin list --available --json) | Out-String
          if ($LASTEXITCODE -ne 0) { throw 'Codex cannot discover the historical fixture' }
          Set-Content -LiteralPath (Join-Path $evidence 'before.json') -Value $seedStateText
          $seedState = $seedStateText | ConvertFrom-Json
          if ($env:FIXTURE_LAYOUT -ne 'legacy-alias') {
            $seedMatches = @($seedState.installed | Where-Object {
              $_.pluginId -eq 'unica@unica' -and $_.version -eq $env:SOURCE_VERSION
            })
            if ($seedMatches.Count -ne 1) { throw "Historical fixture is not installed as Unica $env:SOURCE_VERSION" }
          }

          $seedDoctorText = (& $env:CODEX_BIN doctor --json 2>$null) | Out-String
          Set-Content -LiteralPath (Join-Path $evidence 'before-doctor.json') -Value $seedDoctorText
          $seedDoctor = $seedDoctorText | ConvertFrom-Json
          foreach ($check in @('config.load', 'mcp.config')) {
            if ($seedDoctor.checks.$check.status -ne 'ok') { throw "Historical fixture failed $check" }
          }

          if ($env:TARGET -eq 'win-x64') {
            $migrationText = (& $env:INSTALLER_PATH -Ref main -Target win-x64 -CodexHome $env:CODEX_HOME 2>&1) | Out-String
          } else {
            $migrationText = (& sh $env:INSTALLER_PATH --ref main --target $env:TARGET --codex-home $env:CODEX_HOME 2>&1) | Out-String
          }
          $migrationCode = $LASTEXITCODE
          Set-Content -LiteralPath (Join-Path $evidence 'migration.log') -Value $migrationText
          if ($migrationCode -ne 0) { throw "Migration exited with code $migrationCode`n$migrationText" }
          if ($migrationText -notmatch "Preflight Unica migration from v$([regex]::Escape($env:TARGET_VERSION))") {
            throw "Installer did not target Unica v$env:TARGET_VERSION"
          }

          $stateText = (& $env:CODEX_BIN plugin list --available --json) | Out-String
          if ($LASTEXITCODE -ne 0) { throw 'Codex cannot discover the migrated installation' }
          Set-Content -LiteralPath (Join-Path $evidence 'after.json') -Value $stateText
          $state = $stateText | ConvertFrom-Json
          $matches = @($state.installed | Where-Object {
            $_.pluginId -eq 'unica@unica' -and $_.version -eq $env:TARGET_VERSION
          })
          if ($matches.Count -ne 1) { throw "Expected exactly one installed unica@unica $env:TARGET_VERSION" }
          if (@($state.available | Where-Object { $_.name -eq 'unica' }).Count -ne 0) {
            throw 'Migration left another Unica version available'
          }

          $configPath = Join-Path $env:CODEX_HOME 'config.toml'
          $config = Get-Content -LiteralPath $configPath -Raw
          if ($config -match 'unica@unica-local') { throw 'Migration left the legacy plugin selector' }
          if (Test-Path -LiteralPath (Join-Path $env:CODEX_HOME 'marketplaces/unica-local')) {
            throw 'Migration left the legacy marketplace directory'
          }
          if (Test-Path -LiteralPath (Join-Path $env:CODEX_HOME 'plugins/cache/unica-local')) {
            throw 'Migration left the legacy plugin cache'
          }
          if ($env:FIXTURE_LAYOUT -eq 'issue-90-duplicate' -and $config -notmatch 'issue_90_marker\s*=\s*"preserve-me"') {
            throw 'Migration lost the canonical nested plugin setting from issue #90'
          }

          $doctorText = (& $env:CODEX_BIN doctor --json 2>$null) | Out-String
          Set-Content -LiteralPath (Join-Path $evidence 'doctor.json') -Value $doctorText
          $doctor = $doctorText | ConvertFrom-Json
          foreach ($check in @('config.load', 'mcp.config')) {
            if ($doctor.checks.$check.status -ne 'ok') { throw "Migrated installation failed $check" }
          }

          $promptText = (& $env:CODEX_BIN debug prompt-input 'Проверь доступность Unica skills') | Out-String
          if ($LASTEXITCODE -ne 0) { throw 'Fresh prompt-input failed after migration' }
          Set-Content -LiteralPath (Join-Path $evidence 'prompt-input.json') -Value $promptText
          foreach ($skill in @('unica:code-search', 'unica:platform-help', 'unica:release-support', 'unica:v8-runner')) {
            if ($promptText -notmatch [regex]::Escape($skill)) { throw "Fresh prompt-input is missing $skill" }
          }

          if ($env:TARGET -eq 'win-x64') {
            $rerunText = (& $env:INSTALLER_PATH -Ref main -Target win-x64 -CodexHome $env:CODEX_HOME 2>&1) | Out-String
          } else {
            $rerunText = (& sh $env:INSTALLER_PATH --ref main --target $env:TARGET --codex-home $env:CODEX_HOME 2>&1) | Out-String
          }
          $rerunCode = $LASTEXITCODE
          Set-Content -LiteralPath (Join-Path $evidence 'rerun.log') -Value $rerunText
          if ($rerunCode -ne 0 -or $rerunText -notmatch '"changed"\s*:\s*false') {
            throw 'Second migration run was not a successful no-op'
          }

          $logRoot = Join-Path $env:CODEX_HOME 'log'
          if (Test-Path -LiteralPath $logRoot) {
            $conflicts = Get-ChildItem -LiteralPath $logRoot -Recurse -File |
              Select-String -Pattern 'duplicate plugin MCP server name|conflicting MCP server actions'
            if ($conflicts) { throw 'Codex logs contain a duplicate Unica MCP registration' }
          }

      - name: Upload migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-${{ inputs.label }}-${{ matrix.target }}
          path: ${{ runner.temp }}/migration-evidence
          if-no-files-found: warn
          retention-days: 90
